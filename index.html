<!DOCTYPE html>
<html>
<head>
  <title>Buyer Inquiry Form</title>
  <style>
    body {
      font-family: Arial;
      max-width: 500px;
      margin: 40px auto;
    }
    input, textarea, select, button {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
  </style>
</head>
<body>

<h2>Buyer Inquiry Form</h2>

<form id="inquiryForm">
  <input type="text" name="name" placeholder="Your Name" required />
  <input type="email" name="email" placeholder="Your Email" required />
  <input type="text" name="company" placeholder="Company Name" />
  
  <select name="product">
    <option value="">Select Product</option>
    <option>T-Shirts</option>
    <option>Hoodies</option>
    <option>Home Textiles</option>
    <option>Accessories</option>
  </select>

  <input type="text" name="quantity" placeholder="Order Quantity" />
  
  <textarea name="message" placeholder="Your Requirement"></textarea>

  <button type="submit">Submit Inquiry</button>
</form>

<p id="responseMsg"></p>

<script>
document.getElementById("inquiryForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  const data = Object.fromEntries(formData.entries());

  const response = await fetch("YOUR_N8N_WEBHOOK_URL", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  document.getElementById("responseMsg").innerText = "Thank you! Inquiry submitted.";
  this.reset();
});
</script>

</body>
</html>
